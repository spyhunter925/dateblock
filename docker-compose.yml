version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: dateblock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dateblock
      POSTGRES_PASSWORD: dateblock
      POSTGRES_DB: dateblock
    volumes:
      - dateblock-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dateblock -d dateblock"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dateblock-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://dateblock:dateblock@db:5432/dateblock?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    depends_on:
      db:
        condition: service_healthy
    command: ["./scripts/start.sh"]

volumes:
  dateblock-db-data:
